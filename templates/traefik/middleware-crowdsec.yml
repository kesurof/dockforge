http:
  middlewares:
    crowdsec:
      plugin:
        bouncer:
          enabled: true
          crowdsecLapiHost: "crowdsec:8080"
          crowdsecLapiScheme: "http"
          crowdsecLapiKey: "${CROWDSEC_BOUNCER_KEY}"
          crowdsecMode: "stream"

    security-chain:
      chain:
        middlewares: [crowdsec]
