http:
  routers:
    radarr:
      rule: "Host(`${APP_HOST}`)"
      entryPoints:
        - websecure
      service: radarr
      middlewares:
        - oauth2-chain
      tls:
        certResolver: letsencrypt
  services:
    radarr:
      loadBalancer:
        servers:
          - url: http://radarr:7878
