http:
  routers:
    dockge:
      rule: "Host(`${APP_HOST}`)"
      entryPoints:
        - websecure
      service: dockge
${TRAEFIK_PUBLIC_MIDDLEWARES_BLOCK}
      tls:
        certResolver: letsencrypt
  services:
    dockge:
      loadBalancer:
        servers:
          - url: http://dockge:5001
