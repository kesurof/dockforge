services:
  dockge:
    image: louislam/dockge:latest
    container_name: dockge
    restart: unless-stopped
    networks:
      - proxy
    ports:
      - "127.0.0.1:${APP_PORT}:${APP_PORT}"
    environment:
      - DOCKGE_STACKS_DIR=${BASE_DIR}/apps
      - DOCKGE_ENABLE_CONSOLE=false
      - TZ=${TZ_VALUE}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${BASE_DIR}/data/dockge:/app/data
      - ${BASE_DIR}/apps:${BASE_DIR}/apps

networks:
  proxy:
    name: ${NETWORK_NAME}
    external: true
