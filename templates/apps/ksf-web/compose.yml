# ksf-web — Interface d'administration KSF
# ATTENTION : le socket Docker monté (/var/run/docker.sock) donne des droits élevés sur l'hôte.
# L'accès est restreint à OAuth2 Proxy + Traefik. Ne jamais exposer publiquement sans authentification.
services:
  ksf-web:
    build:
      context: ${KSF_REPO_DIR}/ksf-web
      dockerfile: Dockerfile
    container_name: ksf-web
    restart: unless-stopped
    networks:
      - proxy
    group_add:
      - "${DOCKER_GID}"
    environment:
      - KSF_BASE_DIR=/serverbox
      - KSF_REPO_DIR=/ksf
      - KSF_WEB_ACTIONS_ENABLED=true
      - TZ=${TZ_VALUE}
      - PYTHONUNBUFFERED=1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${KSF_REPO_DIR}:/ksf:ro
      - ${BASE_DIR}:/serverbox
    read_only: true
    tmpfs:
      - /tmp

networks:
  proxy:
    name: ${NETWORK_NAME}
    external: true
