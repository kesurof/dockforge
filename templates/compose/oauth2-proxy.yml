services:
  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:latest
    container_name: oauth2-proxy
    restart: unless-stopped
    networks:
      - proxy
    ports:
      - "127.0.0.1:4180:4180"
    command:
      - "--custom-templates-dir=/etc/oauth2-proxy/templates"
    environment:
      - "OAUTH2_PROXY_PROVIDER=github"
      - "OAUTH2_PROXY_SCOPE=${OAUTH2_SCOPE}"
      - "OAUTH2_PROXY_CLIENT_ID=${OAUTH2_CLIENT_ID}"
      - "OAUTH2_PROXY_CLIENT_SECRET=${OAUTH2_CLIENT_SECRET}"
      - "OAUTH2_PROXY_COOKIE_SECRET=${OAUTH2_COOKIE_SECRET}"
      - "OAUTH2_PROXY_COOKIE_SECURE=true"
      - "OAUTH2_PROXY_COOKIE_DOMAINS=.${DOMAIN}"
      - "OAUTH2_PROXY_WHITELIST_DOMAINS=.${DOMAIN}"
      - "OAUTH2_PROXY_REDIRECT_URL=https://${OAUTH2_HOST}/oauth2/callback"
      - "OAUTH2_PROXY_HTTP_ADDRESS=0.0.0.0:4180"
      - "OAUTH2_PROXY_UPSTREAMS=static://200"
      - "OAUTH2_PROXY_EMAIL_DOMAINS=${OAUTH2_EMAIL_DOMAINS}"
      - "OAUTH2_PROXY_AUTHENTICATED_EMAILS_FILE=${OAUTH2_AUTHENTICATED_EMAILS_FILE}"
      - "OAUTH2_PROXY_GITHUB_USERS=${OAUTH2_GITHUB_USER}"
      - "OAUTH2_PROXY_REVERSE_PROXY=true"
      - "OAUTH2_PROXY_SET_XAUTHREQUEST=true"
      - "OAUTH2_PROXY_PASS_AUTHORIZATION_HEADER=true"
      - "OAUTH2_PROXY_PASS_ACCESS_TOKEN=true"
      - "OAUTH2_PROXY_PASS_USER_HEADERS=true"
    volumes:
      - "./templates:/etc/oauth2-proxy/templates:ro"

networks:
  proxy:
    name: ${NETWORK_NAME}
    external: true
